<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Main purple gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b1f6e"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Glass highlight overlay -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="roundedClip">
      <rect x="2" y="2" width="60" height="60" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <rect x="4" y="5" width="56" height="56" rx="14" fill="#000" opacity="0.4"/>

  <!-- Background gradient -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- Subtle purple border/glow rim -->
  <rect x="2" y="2" width="60" height="60" rx="14"
        fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.45"/>

  <!-- Glass highlight (top half) -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#glass)"
        clip-path="url(#roundedClip)"/>

  <!-- "DE" monogram -->
  <text
    x="32" y="39"
    font-family="'Inter', 'Segoe UI', 'SF Pro Display', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="-1"
    text-anchor="middle"
    fill="#ffffff"
    filter="url(#glow)"
  >DE</text>

  <!-- ₹ accent — bottom right, smaller -->
  <text
    x="51" y="51"
    font-family="'Inter', 'Segoe UI', Arial, sans-serif"
    font-size="11"
    font-weight="600"
    text-anchor="middle"
    fill="#c4b5fd"
    opacity="0.9"
  >₹</text>
</svg>